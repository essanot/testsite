<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة التجاوب</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2>هذه صفحة متجاوبة</h2>
    <div class="box">انظر إلى حجم هذا الزر، هل هو سهل الضغط؟</div>
    <p>النص هنا يجب أن يكون مقروءاً بوضوح دون الحاجة لعمل زووم.</p>
</body>
</html>
