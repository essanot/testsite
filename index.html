<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إجابة</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>

body{
font-family:Tahoma;
margin:204;
background:#f5f5f5;
padding:20px;
}

/* الحاوية الرئيسية */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* قسم الاسئلة */
.questions{
background:white;
padding:20px;
border-radius:8px;
}

/* السؤال */
.question{
padding:15px;
border-bottom:1px solid #ddd;
}

.question:last-child{
border-bottom:none;
}

/* جدول الاعضاء */
.members{
background:white;
padding:20px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:right;
}

th{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="container">

<!-- قسم الاسئلة -->
<div class="questions">

<h2>أحدث الأسئلة</h2>

<div class="question">
ما أفضل لغة برمجة لتطوير المواقع؟
</div>

<div class="question">
كيف أجعل موقعي سريع التحميل؟
</div>

<div class="question">
ما الفرق بين HTML و CSS؟
</div>

<div class="question">
كيف أتعلم JavaScript بسرعة؟
</div>

<div class="question">
ما أفضل قاعدة بيانات للمواقع الكبيرة؟
</div>

</div>


<!-- جدول الاعضاء -->
<div class="members">

<h2>الأعضاء النشطون</h2>

<table>

<tr>
<th>الاسم</th>
<th>النقاط</th>
</tr>

<tr>
<td>أحمد</td>
<td>1200</td>
</tr>

<tr>
<td>محمد</td>
<td>980</td>
</tr>

<tr>
<td>سارة</td>
<td>870</td>
</tr>

<tr>
<td>خالد</td>
<td>640</td>
</tr>

<tr>
<td>ليلى</td>
<td>520</td>
</tr>

</table>

</div>

</div>

</body>
</html>
