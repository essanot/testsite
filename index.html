<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#70A4D8">
    <title>شرح كود كشف الماوس واللمس</title>
    
    <style>
        /* التنسيقات العامة التي تظهر للجميع (جوال وكمبيوتر) */
        body {
            font-family: sans-serif; /* نوع الخط */
            display: flex;           /* نظام ترتيب العناصر لتوسيط البطاقة */
            justify-content: center; /* توسيط أفقي */
            align-items: center;     /* توسيط عمودي */
            height: 100vh;           /* جعل الطول يأخذ كامل شاشة المتصفح */
            margin: 0;               /* إلغاء الفراغات الافتراضية حول الصفحة */
            background-color: #f4f4f4; /* لون خلفية الصفحة رمادي فاتح */
        }

        /* تنسيق شكل البطاقة الأساسي */
        .card {
            padding: 30px;           /* مسافة داخلية بين النص والإطار */
            background: white;       /* لون البطاقة أبيض */
            border: 2px solid #ddd;  /* إطار رمادي خفيف */
            border-radius: 15px;     /* جعل حواف البطاقة دائرية */
            text-align: center;      /* توسيط النص داخل البطاقة */
            width: 280px;            /* عرض البطاقة */
            
            /* أهم سطر للنعومة: أي تغيير في اللون أو الحجم سيستغرق 0.4 ثانية */
            transition: all 0.4s ease-in-out; 
        }

        /* -------------------------------------------------- */
        /* 🚀 الجزء الاحترافي: كشف الماوس (أجهزة الكمبيوتر) 🚀 */
        /* -------------------------------------------------- */
        
        /* هذا الشرط يعني: إذا كان الجهاز يدعم تمرير المؤشر (Hover) 
           وكانت أداة التأشير دقيقة (Fine) مثل الماوس */
        @media (hover: hover) and (pointer: fine) {
            
            /* هنا نضع التنسيق الذي نريده أن يظهر "فقط" عند تمرير الماوس */
            .card:hover {
                border-color: #3498db;      /* تغيير لون الإطار للأزرق */
                background-color: #ebf5fb;  /* تغيير الخلفية لأزرق فاتح جداً */
                transform: translateY(-10px); /* رفع البطاقة للأعلى قليلاً (تأثير رائع) */
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* إضافة ظل تحت البطاقة */
                cursor: pointer;            /* تحويل شكل الماوس ليد (يد ضاغطة) */
            }

            /* إضافة نص توضيحي يظهر فقط لمستخدمي الماوس */
            .card::after {
                content: "✅ تم اكتشاف ماوس: التأثيرات تعمل";
                display: block;
                font-size: 12px;
                color: #3498db;
                margin-top: 15px;
            }
        }

        /* -------------------------------------------------- */
        /* 📱 الجزء الخاص بأجهزة اللمس (الجوالات والتابلت) 📱 */
        /* -------------------------------------------------- */
        
        /* هذا الشرط يعني: إذا كانت أداة التأشير "خشنة" (Coarse) مثل الإصبع */
        @media (pointer: coarse) {
            .card {
                border-color: #e67e22; /* تغيير الإطار للبرتقالي ليميز مستخدم الجوال */
            }

            /* إضافة نص توضيحي يظهر فقط لمستخدمي اللمس */
            .card::after {
                content: "📱 جهاز لمس: تم إيقاف تأثيرات الـ Hover للسرعة";
                display: block;
                font-size: 12px;
                color: #e67e22;
                margin-top: 15px;
            }
            
            /* ملاحظة: هنا لم نضع كود .card:hover 
               لذلك لن يحدث أي شيء مزعج عند لمس البطاقة بالإصبع */
        }
    </style>
</head>
<body>
<div style="background-color:black; padding:30px; color:white; font-size:18px; font-family:Noto Naskh Arabic UI">
شعار الموقع
</div>
    <div class="card">
        <strong>بطاقة ذكية</strong>
        <p>هذا التصميم يعرف نوع جهازك!</p>
    </div>

</body>
</html>
